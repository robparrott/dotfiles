# Starship config — used for both shell prompt and tmux status bar

format = """
$directory\
$git_branch\
$git_status\
$python\
$kubernetes\
$aws\
$battery\
$time\
$line_break\
$character"""

# =============================================================================
# PROMPT MODULES
# =============================================================================

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"

[python]
symbol = " "
style = "bold yellow"

[kubernetes]
disabled = false
style = "bold blue"
symbol = "⎈ "

[aws]
symbol = " "
style = "bold yellow"
# Only show when profile is non-default
format = '[$symbol($profile)(\($region\))]($style) '

[battery]
disabled = false
[[battery.display]]
threshold = 20
style = "bold red"
[[battery.display]]
threshold = 50
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%Y-%m-%d %H:%M"
style = "bold white"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
