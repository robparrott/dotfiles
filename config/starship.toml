# Starship config

# Single-line prompt: dir > git > context > char
format = """
$directory\
$git_branch\
$git_status\
$python\
$kubernetes\
$aws\
$character"""

# =============================================================================
# MODULES
# =============================================================================

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"

[python]
symbol = " "
style = "bold yellow"

[kubernetes]
disabled = false
style = "bold blue"
symbol = "⎈ "

[aws]
symbol = " "
style = "bold yellow"
format = '[$symbol($profile)(\($region\))]($style) '

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[battery]
disabled = true

[time]
disabled = true
