# =============================================================================
# GENERAL SETTINGS
# =============================================================================

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g display-time 2000
set -g escape-time 10          # faster escape (important for vim/neovim)
set -g focus-events on

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Remap prefix from Ctrl+b to Ctrl+a (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix

# Use vi mode for copy mode
setw -g mode-keys vi

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New window preserves current path
bind c new-window -c "#{pane_current_path}"

# New session with prompt
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift+arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# =============================================================================
# MOUSE SUPPORT
# =============================================================================

set -g mouse off

# =============================================================================
# COPY MODE
# =============================================================================

bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# =============================================================================
# SESSION MANAGEMENT
# =============================================================================

set -g detach-on-destroy off
setw -g aggressive-resize on

# =============================================================================
# PLUGINS (via TPM)
#
# Install TPM:  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then in tmux: prefix + I  to install plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# =============================================================================
# CATPPUCCIN THEME
# =============================================================================

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Left: session name
set -g @catppuccin_status_left_separator '█'
set -g @catppuccin_status_right_separator '█'

# Build the status line
set -g status-left-length 50
set -g status-right-length 180

# Left side: session
set -g status-left "#{E:@catppuccin_status_session}"

# Right side: git | k8s/aws ctx | cpu | battery | date time
set -g status-right "\
#[fg=colour141,bg=colour237] #(~/.dotfiles/bin/tmux-git.sh #{pane_current_path}) \
#[fg=colour208,bg=colour237]#(~/.dotfiles/bin/tmux-ctx.sh)\
#{E:@catppuccin_status_cpu}\
#{E:@catppuccin_status_battery}\
#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text '%Y-%m-%d %H:%M'

# CPU color thresholds
set -g @cpu_low_fg_color    '#[fg=colour2]'
set -g @cpu_medium_fg_color '#[fg=colour3]'
set -g @cpu_high_fg_color   '#[fg=colour1]'

# =============================================================================
# BOOTSTRAP TPM (auto-install if not present)
# =============================================================================

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
