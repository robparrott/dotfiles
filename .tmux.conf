# =============================================================================
# GENERAL SETTINGS
# =============================================================================

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g display-time 2000
set -g escape-time 10          # faster escape (important for vim/neovim)
set -g focus-events on

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Remap prefix from Ctrl+b to Ctrl+a (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix

# Use vi mode for copy mode
setw -g mode-keys vi

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New window preserves current path
bind c new-window -c "#{pane_current_path}"

# New session with prompt
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift+arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# =============================================================================
# MOUSE SUPPORT
# =============================================================================

set -g mouse off

# =============================================================================
# COPY MODE
# =============================================================================

bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# =============================================================================
# SESSION MANAGEMENT
# =============================================================================

set -g detach-on-destroy off
setw -g aggressive-resize on

# =============================================================================
# PLUGINS (via TPM)
#
# First run: TPM will auto-bootstrap on tmux start.
# Then press prefix + I to install plugins.
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# =============================================================================
# STATUS BAR
# =============================================================================

set -g status-interval 5
set -g status-left-length 50
set -g status-right-length 100

set -g status-style                    fg=colour250,bg=colour235
set -g status-left                     '#(/Users/parrott/.dotfiles/bin/tmux-sessions.sh)'
set -g status-right                    '#[fg=colour141]#(STARSHIP_CONFIG=~/.config/starship/starship-tmux.toml ~/.tmux/plugins/tmux-starship/scripts/helper.sh)'

setw -g window-status-format          ' #[fg=colour244]#I#[fg=colour240]:#[fg=colour250]#W#F '
setw -g window-status-current-format  '#[fg=colour235,bg=colour31]#[fg=colour255,bg=colour31,bold] #I:#W#F #[fg=colour31,bg=colour235,nobold]'
setw -g window-status-separator       ''

set -g pane-border-style               fg=colour238
set -g pane-active-border-style        fg=colour31
set -g message-style                   fg=colour255,bg=colour24,bold

# =============================================================================
# BOOTSTRAP TPM (auto-install if not present)
# =============================================================================

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
