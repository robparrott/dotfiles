# =============================================================================
# GENERAL SETTINGS
# =============================================================================

set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g display-time 2000

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Remap prefix from Ctrl+b to Ctrl+a (like GNU Screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix

# Use vi mode for copy mode
setw -g mode-keys vi

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New window preserves current path
bind c new-window -c "#{pane_current_path}"

# New session with prompt
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrow (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# =============================================================================
# MOUSE SUPPORT
# =============================================================================

set -g mouse off

# =============================================================================
# STATUS BAR
# =============================================================================

set -g status-style bg=colour234,fg=colour137
set -g status-left-length 20
set -g status-right-length 50

# Left: session name
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[default] '

# Right: date and time
set -g status-right '#[fg=colour233,bg=colour241] %Y-%m-%d #[fg=colour233,bg=colour245] %H:%M:%S '

# Window status
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81

# =============================================================================
# COPY MODE
# =============================================================================

bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# =============================================================================
# SESSION MANAGEMENT
# =============================================================================

# Don't destroy session when detaching
set -g detach-on-destroy off

# Aggressive resize for multi-client sessions
setw -g aggressive-resize on
